<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Great Bay Financial | Connecting Vision with Capital</title>
  <meta
    name="description"
    content="Great Bay Financial structures capital solutions for equipment-intensive businesses, acquisitions, and growth initiatives."
  />
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['IBM Plex Sans', 'sans-serif'],
            display: ['Cormorant Garamond', 'serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: {
            background: '#07111F',
            canvas: '#0C1828',
            surface: '#102742',
            surfaceStrong: '#153452',
            accent: '#D7BD84',
            accentSoft: '#F1E6CE',
            cream: '#F6EFE3',
            white: '#FFFAF2',
            mist: '#9FB2CB',
          },
          animation: {
            'float-slow': 'float 10s ease-in-out infinite',
            'fade-up': 'fadeUp 900ms cubic-bezier(0.22, 1, 0.36, 1) forwards',
            'line-run': 'lineRun 7s linear infinite',
            'glow-pulse': 'glowPulse 5s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(28px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            glowPulse: {
              '0%, 100%': { opacity: '0.35' },
              '50%': { opacity: '0.7' },
            },
            lineRun: {
              '0%': { transform: 'translateY(-110%)' },
              '100%': { transform: 'translateY(110%)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #07111F;
      color: #F6EFE3;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #07111F;
    }

    ::-webkit-scrollbar-thumb {
      background: #153452;
      border-radius: 4px;
      border: 1px solid #07111F;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #D7BD84;
    }

    ::selection {
      background-color: #D7BD84;
      color: #07111F;
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>

  <script>
    // Custom smooth scroll with easeInOutCubic easing
    function smoothScrollTo(targetY, duration) {
      const startY = window.scrollY;
      const distance = targetY - startY;
      let startTime = null;

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function step(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.min(elapsed / duration, 1);
        window.scrollTo(0, startY + distance * easeInOutCubic(progress));
        if (progress < 1) requestAnimationFrame(step);
      }

      requestAnimationFrame(step);
    }

    document.addEventListener('click', function (e) {
      const link = e.target.closest('a[href^="#"]');
      if (!link) return;
      const id = link.getAttribute('href').slice(1);
      const target = document.getElementById(id);
      if (!target) return;
      e.preventDefault();
      const targetY = target.getBoundingClientRect().top + window.scrollY;
      smoothScrollTo(targetY, 1200);
    });
  </script>
</body>

</html>
